<!DOCTYPE html>
<html>
<head>
<title>archive_03</title>
</head>

<body style="background:black; color:#cfcfcf; font-family:monospace; padding:40px;">

<p>> loading fragment...</p>
<p>> signal unstable</p>

<br>

<p>ARCHIVE: A03</p>
<p style="opacity:0.3;">cycle 03 unstable</p>

<br>

<p id="msg"></p>

<br>

<p>> input required</p>

<input id="pw" autocomplete="off">
<button onclick="check()">enter</button>

<p id="res"></p>

<script>

// 🧠 TEXTO PROGRESIVO
let lines = [
"you stayed.",
"most don't.",
"",
"you followed the pattern again.",
"",
"this is not about the music anymore.",
"",
"it's about you."
];

let i = 0;
function type(){
  if(i < lines.length){
    document.getElementById("msg").innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(type, 1200);
  }
}
type();

// 🔑 INPUT PRINCIPAL (SIN ROMPER FLUJO)
function check(){
  let v = document.getElementById("pw").value.trim();

  // PRIMER CÓDIGO (DESBLOQUEA PERO NO REDIRIGE)
  if(v === "i_am_not_the_first"){
    document.getElementById("res").innerText =
    "> accepted...\n> hidden fragment detected";
  }

  // SEGUNDO CÓDIGO (ACCESO REAL A A04)
  else if(v === "open_the_archive"){
    window.location.href = "./archive_04.html";
  }

  // 🧠 EASTER EGGS
  else if(v === "nevis"){
    document.getElementById("res").innerText = "> you said her name.";
  }
  else if(v === "exit"){
    document.getElementById("res").innerText = "> you can't leave yet";
  }
  else if(v === "who_are_you"){
    document.getElementById("res").innerText = "> you already know";
  }

  else {
    document.getElementById("res").innerText = "> incorrect";
  }
}

// ⌨️ ENTER FUNCIONA
document.getElementById("pw").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    check();
  }
});

// 💀 GLITCH TEXTO (PARPADEO)
setInterval(()=>{
  let msg = document.getElementById("msg");
  if(msg && Math.random() > 0.96){
    msg.style.opacity = "0.2";
    setTimeout(()=> msg.style.opacity = "1", 200);
  }
}, 200);

// 🧨 GLITCH VISUAL
setInterval(()=>{
  document.body.style.filter =
  Math.random() > 0.97 ? "invert(1)" : "invert(0)";
}, 150);

// 🧠 MENSAJE ALEATORIO
setTimeout(()=>{
  if(Math.random() > 0.5){
    let p = document.createElement("p");
    p.innerText = "> this is not your first time here";
    document.body.appendChild(p);
  }
}, 3000);

// 🔻 SISTEMA DEGRADÁNDOSE
let integrity = 100;

let degrade = setInterval(()=>{
  integrity -= Math.floor(Math.random()*4);

  let p = document.createElement("p");
  p.innerText = "> integrity: " + integrity + "%";
  document.body.appendChild(p);

  if(integrity < 60){
    let warn = document.createElement("p");
    warn.innerText = "> memory unstable";
    document.body.appendChild(warn);
  }

  if(integrity < 40){
    let warn = document.createElement("p");
    warn.innerText = "> fragment corruption detected";
    document.body.appendChild(warn);
  }

  if(integrity < 20){
    clearInterval(degrade);

    let crash = document.createElement("p");
    crash.innerText = "> attempting recovery...";
    document.body.appendChild(crash);
  }

}, 2500);

// 🧩 MEMORIA DEL USUARIO
if(localStorage.getItem("visited_a03")){
  let p = document.createElement("p");
  p.innerText = "> you came back.";
  document.body.appendChild(p);
}
localStorage.setItem("visited_a03", "true");

</script>

</body>
</html>              
</html>
