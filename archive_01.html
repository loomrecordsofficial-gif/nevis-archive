<!DOCTYPE html>
<html>
<head>
<title>archive_01</title>
<style>
body {
  background: black;
    color: #cfcfcf;
      font-family: monospace;
        padding: 40px;
          overflow: hidden;
          }

          .glitch {
            animation: flicker 0.15s infinite;
            }

            @keyframes flicker {
              0% { opacity: 1; }
                50% { opacity: 0.8; }
                  100% { opacity: 1; }
                  }

                  .shift {
                    position: relative;
                      animation: shift 2s infinite alternate;
                      }

                      @keyframes shift {
                        0% { left: 0px; }
                          100% { left: 2px; }
                          }

                          .hidden {
                            color: #000;
                            }
                            </style>
                            </head>

                            <body>

                            <p class="glitch">> loading archive...</p>
                            <p>> file unstable</p>
                            <p class="shift">> attempting recovery...</p>

                            <br>

                            <p>ARCHIVE: A01</p>
                            <p id="integrity">integrity: 63%</p>

                            <br>

                            <p>[log_01] playback initiated</p>
                            <p>[log_02] identity mismatch detected</p>

                            <br>

                            <button onclick="playAudio()">> play fragment_01</button>
                            <audio id="audio1">
                              <source src="audio1.mp3" type="audio/mpeg">
                              </audio>

                              <br><br>

                              <p>> input required</p>
                              <input type="text" id="pw">
                              <button onclick="check()">enter</button>

                              <p id="result"></p>

                              <p class="hidden">you are not the first</p>

                              <script>
                              function playAudio(){
                                document.getElementById("audio1").play();
                                }

                                function check(){
                                  let input = document.getElementById("pw").value;
                                    if(input === "replay_again_dont"){
                                        document.getElementById("result").innerHTML =
                                            "> access granted<br><br><a href='archive_02.html'>open next file</a>";
                                              } else {
                                                  document.getElementById("result").innerHTML = "> access denied";
                                                    }
                                                    }

                                                    // 🔥 CAMBIO AUTOMÁTICO (parece que evoluciona)
                                                    setTimeout(()=>{
                                                      document.getElementById("integrity").innerText = "integrity: 58%";
                                                      }, 4000);

                                                      // 🧨 glitch aleatorio
                                                      setInterval(()=>{
                                                        document.body.style.marginLeft = (Math.random()*4)+"px";
                                                        }, 120);
                                                        </script>

                                                        </body>
                                                        </html>
