<script>
function check(){
  let input = document.getElementById("pw").value.trim().toLowerCase();

  if(input === "replay_again_dont"){
    document.getElementById("result").innerHTML = "> access granted...";

    setTimeout(()=>{
      window.location.href = "./archive_02.html";
    }, 1000);

  } else {
    document.getElementById("result").innerHTML = "> access denied";
  }
}

// ⌨️ ENTER FUNCIONA
document.getElementById("pw").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    check();
  }
});
</script>
