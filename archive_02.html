<!DOCTYPE html>
<html>
<head>
<title>archive_02</title>
</head>

<body style="background:black; color:#cfcfcf; font-family:monospace; padding:40px;">

<p>> recovering file...</p>
<p id="int">> integrity: 41%</p>
<p>> external interference detected</p>

<br>

<p>ARCHIVE: A02</p>
<p>this is not the same file</p>
<p>you were not supposed to continue</p>
<p style="opacity:0.3;">cycle 02 detected</p>

<br>

<p id="log">[log_09] user returned</p>
<p>[log_10] pattern recognized</p>
<p>[log_11] previous cycle detected</p>

<br>

<p>> input required</p>

<input id="pw" autocomplete="off">
<button id="btn">enter</button>

<p id="res"></p>

<script>

// 🔥 REFERENCIAS SEGURAS
const input = document.getElementById("pw");
const btn = document.getElementById("btn");
const res = document.getElementById("res");

// 🧠 CONTADOR DE FALLOS
function addFail(){
  let fails = parseInt(localStorage.getItem("fail_count") || 0);
  localStorage.setItem("fail_count", fails + 1);
}

// 🚀 ACCESO A A03
function goA03(){
  window.location.href = "./archive_03.html";
}

// 🔑 CHECK CENTRAL (NO SE ROMPE)
function check(){

  let v = input.value
    .trim()
    .toLowerCase()
    .replace(/\s+/g,"");

  // ✅ CORRECTO
  if(v === "still_watching"){

    res.innerHTML = "> access granted<br>redirecting...";

    setTimeout(goA03, 700);
  }

  // 🧠 EASTER EGGS
  else if(v === "nevis"){
    res.innerText = "> she sees you too";
  }
  else if(v === "again"){
    res.innerText = "> it repeats";
  }
  else if(v === "help"){
    res.innerText = "> no one helped you before";
  }

  // ❌ ERROR (REGISTRA)
  else {
    addFail();
    res.innerText = "> access denied";
  }
}

// 🖱️ CLICK SIEMPRE FUNCIONA
btn.addEventListener("click", check);

// ⌨️ ENTER SIEMPRE FUNCIONA
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    check();
  }
});

// 💀 GLITCH CONTROLADO (NO INTERFIERE)
setInterval(()=>{
  let log = document.getElementById("log");
  if(log){
    log.innerText =
    Math.random() > 0.5
    ? "[log_09] user returned"
    : "[log_09] user still here";
  }
}, 2000);

// 🔻 DEGRADACIÓN VISUAL
setTimeout(()=>{
  let int = document.getElementById("int");
  if(int){
    int.innerText = "> integrity: 33%";
  }
}, 5000);

// 🧠 DETALLE RARO
setTimeout(()=>{
  if(Math.random() > 0.6){
    let p = document.createElement("p");
    p.innerText = "> why are you still here?";
    document.body.appendChild(p);
  }
}, 4000);

</script>

</body>
</html>
